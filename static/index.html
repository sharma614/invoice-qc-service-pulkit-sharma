<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice QC Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        header h1 { font-size: 2em; margin-bottom: 5px; }
        header p { opacity: 0.9; }
        main { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 30px; }
        .panel { border: 1px solid #e0e0e0; border-radius: 6px; padding: 20px; }
        .panel h2 { font-size: 1.3em; margin-bottom: 15px; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #555; }
        input[type="file"], textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: monospace; }
        textarea { min-height: 150px; resize: vertical; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background: #5568d3; }
        button.secondary { background: #764ba2; }
        button.secondary:hover { background: #64398a; }
        .results { margin-top: 20px; }
        .summary { background: #f5f5f5; padding: 15px; border-radius: 4px; margin-bottom: 15px; }
        .summary-item { display: flex; justify-content: space-between; margin: 5px 0; }
        .summary-item strong { color: #333; }
        .summary-item .value { color: #667eea; font-weight: 600; }
        .invoice-list { max-height: 400px; overflow-y: auto; }
        .invoice-item { border: 1px solid #e0e0e0; border-radius: 4px; padding: 12px; margin-bottom: 10px; }
        .invoice-item.valid { border-left: 4px solid #4caf50; }
        .invoice-item.invalid { border-left: 4px solid #f44336; }
        .invoice-id { font-weight: 600; color: #333; margin-bottom: 5px; }
        .invoice-status { 
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .invoice-status.valid { background: #e8f5e9; color: #2e7d32; }
        .invoice-status.invalid { background: #ffebee; color: #c62828; }
        .invoice-errors { margin-top: 8px; font-size: 0.9em; }
        .error-item { color: #f44336; margin: 3px 0 3px 15px; }
        .filter-btn {
            padding: 8px 12px;
            margin-right: 5px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }
        .filter-btn.active { background: #764ba2; }
        .loading { text-align: center; color: #999; padding: 20px; }
        .error-msg { background: #ffebee; border-left: 4px solid #f44336; color: #c62828; padding: 12px; border-radius: 4px; margin-bottom: 15px; }
        .success-msg { background: #e8f5e9; border-left: 4px solid #4caf50; color: #2e7d32; padding: 12px; border-radius: 4px; margin-bottom: 15px; }
        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Invoice QC Console</h1>
            <p>Extract, validate, and review invoice quality control results</p>
        </header>
        <main>
            <div class="panel">
                <h2>Input</h2>
                <div class="input-group">
                    <label>Upload PDFs:</label>
                    <input type="file" id="pdfFiles" accept=".pdf" multiple>
                    <button onclick="uploadPDFs()">Extract & Validate PDFs</button>
                </div>
                <div style="text-align: center; color: #999; margin: 15px 0;">— or —</div>
                <div class="input-group">
                    <label>Paste JSON Invoices:</label>
                    <textarea id="jsonInput" placeholder='[{"invoice_number":"INV-001",...}]'></textarea>
                    <button class="secondary" onclick="validateJSON()">Validate JSON</button>
                </div>
            </div>
            <div class="panel">
                <h2>Results</h2>
                <div id="results">
                    <p style="color: #999; text-align: center; padding: 40px 20px;">Submit invoices to see results</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function uploadPDFs() {
            const files = document.getElementById('pdfFiles').files;
            if (files.length === 0) {
                alert('Please select PDF files');
                return;
            }

            const formData = new FormData();
            for (let file of files) {
                formData.append('files', file);
            }

            showLoading('Extracting and validating PDFs...');
            try {
                const response = await fetch(API_BASE + '/extract-and-validate-pdfs', {
                    method: 'POST',
                    body: formData
                });
                
                // Check if response has content
                const contentLength = response.headers.get('content-length');
                const text = await response.text();
                
                if (!text) {
                    showError('Error: Empty response from API');
                    return;
                }
                
                let data;
                try {
                    data = JSON.parse(text);
                } catch (parseError) {
                    console.error('JSON Parse Error:', parseError);
                    console.error('Response text:', text.substring(0, 500));
                    showError('Error: Invalid JSON response - ' + parseError.message);
                    return;
                }
                
                if (response.ok) {
                    displayResults(data);
                } else {
                    showError('Error: ' + (data.detail || 'Unknown error'));
                }
            } catch (e) {
                showError('Failed to connect to API: ' + e.message);
            }
        }

        async function validateJSON() {
            const jsonText = document.getElementById('jsonInput').value.trim();
            if (!jsonText) {
                alert('Please paste JSON');
                return;
            }

            let invoices;
            try {
                invoices = JSON.parse(jsonText);
                if (!Array.isArray(invoices)) invoices = [invoices];
            } catch (e) {
                showError('Invalid JSON: ' + e.message);
                return;
            }

            showLoading('Validating invoices...');
            try {
                const response = await fetch(API_BASE + '/validate-json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(invoices)
                });
                
                const text = await response.text();
                if (!text) {
                    showError('Error: Empty response from API');
                    return;
                }
                
                let data;
                try {
                    data = JSON.parse(text);
                } catch (parseError) {
                    console.error('JSON Parse Error:', parseError);
                    console.error('Response text:', text.substring(0, 500));
                    showError('Error: Invalid JSON response - ' + parseError.message);
                    return;
                }
                
                if (response.ok) {
                    displayResults(data);
                } else {
                    showError('Error: ' + (data.detail || 'Unknown error'));
                }
            } catch (e) {
                showError('Failed to connect to API: ' + e.message);
            }
        }

        function displayResults(data) {
            const summary = data.summary || {};
            const results = data.results || [];

            let html = `
                <div class="success-msg">✓ Validation completed</div>
                <div class="summary">
                    <div class="summary-item">
                        <strong>Total Invoices:</strong>
                        <span class="value">${summary.total_invoices || 0}</span>
                    </div>
                    <div class="summary-item">
                        <strong>Valid:</strong>
                        <span class="value" style="color: #4caf50;">${summary.valid_invoices || 0}</span>
                    </div>
                    <div class="summary-item">
                        <strong>Invalid:</strong>
                        <span class="value" style="color: #f44336;">${summary.invalid_invoices || 0}</span>
                    </div>
                </div>
                <div style="margin-top: 10px;">
                    <button class="filter-btn active" onclick="filterInvoices('all')">All</button>
                    <button class="filter-btn" onclick="filterInvoices('valid')">Valid Only</button>
                    <button class="filter-btn" onclick="filterInvoices('invalid')">Invalid Only</button>
                </div>
                <div class="invoice-list" id="invoiceList">
            `;

            results.forEach((r, idx) => {
                const status = r.is_valid ? 'valid' : 'invalid';
                html += `
                    <div class="invoice-item ${status}" data-status="${status}">
                        <div class="invoice-id">${r.invoice_id}</div>
                        <span class="invoice-status ${status}">
                            ${r.is_valid ? '✓ Valid' : '✗ Invalid'}
                        </span>
                        ${!r.is_valid ? `<div class="invoice-errors">
                            ${r.errors.map(e => `<div class="error-item">• ${e}</div>`).join('')}
                        </div>` : ''}
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('results').innerHTML = html;
        }

        function filterInvoices(type) {
            const items = document.querySelectorAll('.invoice-item');
            items.forEach(item => {
                if (type === 'all' || item.dataset.status === type) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function showLoading(msg) {
            document.getElementById('results').innerHTML = `<div class="loading">${msg}</div>`;
        }

        function showError(msg) {
            document.getElementById('results').innerHTML = `<div class="error-msg">${msg}</div>`;
        }
    </script>
</body>
</html>
